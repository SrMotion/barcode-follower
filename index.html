<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarcodeFollower Pro | Trendyol Ürün Takip</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <h1>BarcodeFollower <span style="color: var(--accent);">Pro</span></h1>
                <p>Mağaza bazlı ürün ve barkod otomasyonu</p>
            </div>
            <div id="statsContainer" style="display: none;">
                <span class="stats-badge" id="productCount">0 Ürün Bulundu</span>
            </div>
        </header>

        <section class="search-section">
            <div class="input-group">
                <input type="text" id="storeIdInput" placeholder="Trendyol Mağaza ID (Örn: 152263)" value="152263">
            </div>
            <button class="search-btn" id="searchBtn">
                <i data-lucide="search"></i>
                Mağazayı Tara
            </button>
        </section>

        <div class="loader" id="loader"></div>

        <div class="actions-section" id="actionsHeader" style="display: none;">
            <div class="bulk-actions">
                <button class="btn-secondary" id="copyAllLinks">
                    <i data-lucide="link"></i>
                    Linkleri Kopyala
                </button>
                <button class="btn-secondary" id="copyAllBarcodes">
                    <i data-lucide="barcode"></i>
                    Barkodları Kopyala
                </button>
                <button class="btn-secondary" id="exportCsv">
                    <i data-lucide="download"></i>
                    CSV İndir
                </button>
            </div>
            <div class="view-options">
                <span class="text-secondary" style="font-size: 0.8rem;">Görünüm: <b>Galeri</b></span>
            </div>
        </div>

        <main class="products-grid" id="productsGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-secondary);">
                <i data-lucide="store" size="48" style="margin-bottom: 1rem; opacity: 0.5;"></i>
                <p>Mağaza ID girerek tarama başlatın</p>
            </div>
        </main>

        <!-- Debug / Hata Detayı Alanı -->
        <div id="debugSection" style="display: none; margin-top: 3rem; padding: 1.5rem; background: rgba(239, 68, 68, 0.1); border: 1px dashed var(--danger); border-radius: 16px;">
            <h4 style="color: var(--danger); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                <i data-lucide="alert-circle"></i> Sunucudan Gelen Hata Detayı (Bunu Kopyalayıp Atın):
            </h4>
            <textarea id="debugContent" readonly style="width: 100%; height: 300px; background: rgba(0,0,0,0.3); color: #cbd5e1; border: 1px solid var(--glass-border); border-radius: 8px; padding: 1rem; font-family: monospace; font-size: 0.8rem;"></textarea>
        </div>
    </div>

    <script type="module" src="/app.js"></script>
</body>
</html>
