<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarcodeFollower Pro | Trendyol Ürün Takip</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <h1>BarcodeFollower <span style="color: var(--accent);">Pro</span></h1>
                <p>Mağaza bazlı ürün ve barkod otomasyonu</p>
            </div>
            <div id="statsContainer" style="display: none;">
                <span class="stats-badge" id="productCount">0 Ürün Bulundu</span>
            </div>
        </header>

        <section class="search-section">
            <div class="input-group">
                <input type="text" id="storeIdInput" placeholder="Trendyol Mağaza ID (Örn: 152263)" value="152263">
            </div>
            <button class="search-btn" id="searchBtn">
                <i data-lucide="search"></i>
                Mağazayı Tara
            </button>
        </section>

        <!-- Debug / Hata Detayı Alanı (En Tepeye Alındı) -->
        <div id="debugSection" style="display: none; margin-bottom: 2rem; padding: 1.5rem; background: rgba(239, 68, 68, 0.15); border: 2px solid var(--danger); border-radius: 16px; animation: fadeInUp 0.5s ease-out;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h4 style="color: var(--danger); display: flex; align-items: center; gap: 0.5rem; margin: 0;">
                    <i data-lucide="bug"></i> HATA ANALİZİ
                </h4>
                <button class="btn-secondary" onclick="document.getElementById('debugContent').select(); document.execCommand('copy'); alert('Kopyalandı!');">
                    Kopyala
                </button>
            </div>
            <textarea id="debugContent" readonly style="width: 100%; height: 350px; background: #000; color: #0f0; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 1rem; font-family: 'Courier New', monospace; font-size: 0.85rem; line-height: 1.4;"></textarea>
            <p style="color: var(--text-secondary); font-size: 0.75rem; margin-top: 0.8rem;">İpucu: Yukarıdaki metnin tamamını kopyalayıp bana gönder kanka.</p>
        </div>

        <div class="loader" id="loader"></div>

        <div class="actions-section" id="actionsHeader" style="display: none;">
            <div class="bulk-actions">
                <button class="btn-secondary" id="copyAllLinks">
                    <i data-lucide="link"></i>
                    Linkleri Kopyala
                </button>
                <button class="btn-secondary" id="copyAllBarcodes">
                    <i data-lucide="barcode"></i>
                    Barkodları Kopyala
                </button>
                <button class="btn-secondary" id="exportCsv">
                    <i data-lucide="download"></i>
                    CSV İndir
                </button>
            </div>
        </div>

        <main class="products-grid" id="productsGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-secondary);">
                <i data-lucide="store" size="48" style="margin-bottom: 1rem; opacity: 0.5;"></i>
                <p>Mağaza ID girerek tarama başlatın</p>
            </div>
        </main>
    </div>

    <script type="module" src="/app.js"></script>
</body>
</html>
